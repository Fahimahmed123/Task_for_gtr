<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Phone Advisor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            margin: 20px 0;
            display: none;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            display: none;
            border: 2px solid #e0e0e0;
        }

        .result.show {
            display: block;
        }

        .result h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-content {
            white-space: pre-wrap;
            line-height: 1.6;
            color: #444;
            font-size: 15px;
        }

        .error {
            background: #fee;
            border: 2px solid #fcc;
            color: #c00;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .example-questions {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .example-questions h4 {
            color: #333;
            margin-bottom: 15px;
        }

        .example-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .example-btn {
            background: #f0f0f0;
            border: 1px solid #ddd;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            color: #333;
        }

        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Samsung Phone Advisor</h1>
            <p>Ask me anything about Samsung phones!</p>
        </div>
        
        <div class="content">
            <div class="input-group">
                <label for="question">Your Question:</label>
                <textarea 
                    id="question" 
                    placeholder="e.g., What are the specs of Samsung Galaxy S23 Ultra? or Compare Galaxy S23 Ultra and S22 Ultra"
                ></textarea>
            </div>

            <button id="askBtn" onclick="askQuestion()">
                <span>🤖 Get Answer</span>
            </button>

            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 10px; color: #667eea;">Analyzing your question...</p>
            </div>

            <div class="result" id="result">
                <h3>📝 Answer:</h3>
                <div class="result-content" id="answer"></div>
            </div>

            <div class="error" id="error"></div>

            <div class="example-questions">
                <h4>💡 Try these example questions:</h4>
                <div class="example-buttons">
                    <button class="example-btn" onclick="setExampleQuestion('What are the specs of Samsung Galaxy S23 Ultra?')">
                        📊 S23 Ultra Specs
                    </button>
                    <button class="example-btn" onclick="setExampleQuestion('Compare Galaxy S23 Ultra and S22 Ultra')">
                        🔄 Compare S23 vs S22
                    </button>
                    <button class="example-btn" onclick="setExampleQuestion('Which Samsung phone has the best battery?')">
                        🔋 Best Battery
                    </button>
                    <button class="example-btn" onclick="setExampleQuestion('Recommend a Samsung phone with good camera')">
                        📸 Camera Recommendation
                    </button>
                    <button class="example-btn" onclick="setExampleQuestion('What is the price of Galaxy Z Fold 5?')">
                        💰 Price Check
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function askQuestion() {
            const question = document.getElementById('question').value.trim();
            if (!question) {
                alert('Please enter a question!');
                return;
            }

            // Show loading, hide previous results
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');
            document.getElementById('askBtn').disabled = true;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Something went wrong');
                }

                // Display the answer
                document.getElementById('answer').textContent = data.answer;
                document.getElementById('result').classList.add('show');
            } catch (error) {
                // Display error
                const errorDiv = document.getElementById('error');
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.classList.add('show');
            } finally {
                // Hide loading, enable button
                document.getElementById('loading').style.display = 'none';
                document.getElementById('askBtn').disabled = false;
            }
        }

        function setExampleQuestion(question) {
            document.getElementById('question').value = question;
            askQuestion();
        }

        // Allow Enter key to submit (but Shift+Enter for new line)
        document.getElementById('question').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askQuestion();
            }
        });
    </script>
</body>
</html>
